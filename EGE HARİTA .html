<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ege Bölgesi Haritası</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f7;--sf:#fff;--sf2:#f4f2ee;--bd:#e8e4dc;
  --ac:#2563eb;--tx:#1a1a1a;--tx2:#5a5a6a;--tx3:#a8a8b8
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* topbar */
#tb{display:flex;align-items:center;gap:14px;padding:0 20px;height:52px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
#tb img{height:38px;object-fit:contain}
.sp{flex:1}
.vbs{display:flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.vb{height:30px;padding:0 14px;border:none;background:transparent;color:var(--tx2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.vb.on{background:var(--tx);color:#fff}
.tbtn{height:30px;padding:0 13px;border-radius:7px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.tbtn:hover{border-color:var(--ac);color:var(--ac)}
/* layout */
#body{display:flex;flex:1;overflow:hidden}
/* map */
#mw{flex:1;min-width:0;background:#c8dff5;overflow:hidden;position:relative}
#mw svg{width:100%;height:100%;cursor:default}
.pp{stroke:#9a9888;stroke-width:1.1;cursor:pointer;transition:fill .12s}
.pp:hover{stroke:#333;stroke-width:1.7;opacity:.9}
.pp.hi{stroke:#111;stroke-width:2.2}
.dp{stroke:#bbb;stroke-width:0.45;stroke-dasharray:3,2;cursor:pointer;transition:fill .12s}
.dp:hover{stroke:#444;stroke-width:.8;opacity:.85}
.dp.hi{stroke:#111;stroke-width:1.1;stroke-dasharray:none}
.po{fill:none;stroke:#333;stroke-width:2;stroke-linejoin:round;pointer-events:none}
.ml{pointer-events:none;user-select:none;font-family:'DM Sans',sans-serif}
/* zoom */
#zc{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:4px}
.zb{width:30px;height:30px;border-radius:7px;border:1px solid rgba(0,0,0,.15);background:rgba(255,255,255,.88);color:#333;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:inherit;box-shadow:0 1px 4px rgba(0,0,0,.1);transition:all .15s}
.zb:hover{border-color:var(--ac);color:var(--ac)}
/* links btn */
#glbtn{position:absolute;top:12px;right:12px;height:30px;padding:0 12px;border-radius:8px;border:1px solid rgba(0,0,0,.15);background:rgba(255,255,255,.88);color:#333;font-size:12px;font-family:inherit;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .15s}
#glbtn:hover{border-color:var(--ac);color:var(--ac)}
/* volunteer table */
#voltbl{position:absolute;bottom:14px;left:14px;background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.1);border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.1);display:none}
#voltbl .vtlbl{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--tx3);text-transform:uppercase;padding:6px 11px 3px}
#voltbl table{border-collapse:collapse;font-size:11px}
#voltbl th{padding:4px 11px;font-weight:600;color:var(--tx3);text-align:right;background:rgba(0,0,0,.03)}
#voltbl th:first-child{text-align:left}
#voltbl td{padding:4px 11px;color:var(--tx2);text-align:right;border-top:1px solid var(--bd)}
#voltbl td:first-child{text-align:left;font-weight:500;color:var(--tx)}
/* right panel */
#rp{width:278px;background:var(--sf);border-left:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#rp-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--tx3);font-size:13px;padding:24px;text-align:center;line-height:1.6}
#rp-empty svg{opacity:.2}
#rp-inner{flex:1;display:none;flex-direction:column;overflow:hidden}
#rp-hdr{padding:14px 16px 0;flex-shrink:0}
.cstrip{height:3px;border-radius:2px;margin-bottom:10px}
#rp-title{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;color:var(--tx);padding-bottom:10px;border-bottom:1px solid var(--bd)}
#rp-acc{flex:1;overflow-y:auto}
/* accordion */
.acc-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:1px solid var(--bd);user-select:none;transition:all .15s}
.acc-hdr:hover{background:var(--sf2);color:var(--tx)}
.acc-hdr.open{color:var(--ac)}
.acc-hdr .arr{font-size:10px;transition:transform .2s}
.acc-hdr.open .arr{transform:rotate(180deg)}
.acc-body{display:none;flex-direction:column;border-bottom:1px solid var(--bd);background:var(--sf2)}
.acc-body.open{display:flex}
/* contact rows */
.cc-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 16px;border-bottom:1px solid var(--bd);gap:10px}
.cc-row:last-child{border-bottom:none}
.cc-k{font-size:11px;color:var(--tx3);flex-shrink:0}
.cc-v{font-size:12px;font-weight:500;color:var(--tx);text-align:right;word-break:break-all}
.cc-v a{color:var(--ac);text-decoration:none}
.cc-v a:hover{text-decoration:underline}
.no-info{padding:14px 16px;font-size:12px;color:var(--tx3);text-align:center}
/* links overlay */
#gl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none;align-items:flex-start;justify-content:flex-end;padding:56px 14px 0}
#gl-panel{background:var(--sf);border:1px solid var(--bd);border-radius:12px;width:285px;max-height:72vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.15)}
#gl-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
#gl-hdr span{font-size:13px;font-weight:600}
#gl-hdr button{width:24px;height:24px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer;font-size:16px;font-family:inherit;display:flex;align-items:center;justify-content:center}
#gl-body{flex:1;overflow-y:auto;padding:11px 14px;display:flex;flex-direction:column;gap:7px}
.lnk-item{display:flex;align-items:center;gap:9px;padding:9px 13px;border:1px solid var(--bd);border-radius:9px;background:var(--sf2);text-decoration:none;color:var(--tx);transition:all .15s}
.lnk-item:hover{border-color:var(--ac);background:#fff;color:var(--ac)}
.lnk-icon{font-size:14px;flex-shrink:0}
.lnk-lbl{font-size:13px;font-weight:500;flex:1}
.lnk-arr{font-size:12px;color:var(--tx3);flex-shrink:0}
</style>
</head>
<body>

<div id="tb">
  <img id="logo-img" src="" alt="TEMA">
  <div class="sp"></div>
  <div class="vbs">
    <button class="vb on" id="btn-il"   onclick="setView('il')">İller</button>
    <button class="vb"    id="btn-ilce" onclick="setView('ilce')">İlçeler</button>
  </div>
  <button class="tbtn" onclick="document.getElementById('imp-file').click()">⬆ Veri Yükle</button>
  <input type="file" id="imp-file" accept=".json" style="display:none" onchange="doImport(event)">
</div>

<div id="body">
  <div id="mw">
    <svg id="svg" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <rect x="0" y="0" width="900" height="700" fill="#c8dff5"/>
      <g id="g-dist"></g>
      <g id="g-prov"></g>
      <g id="g-outline"></g>
      <g id="g-lbl"></g>
    </svg>
    <div id="zc">
      <button class="zb" id="z-in">+</button>
      <button class="zb" id="z-out">−</button>
      <button class="zb" id="z-rst" style="font-size:11px">⊙</button>
    </div>
    <button id="glbtn">🔗 Faydalı Linkler</button>
    <div id="voltbl">
      <div class="vtlbl">Gönüllü Tablosu</div>
      <table id="vt-table">
        <thead><tr><th>İl</th><th>Gönüllü</th></tr></thead>
        <tbody id="vt-body"></tbody>
      </table>
    </div>
  </div>

  <div id="rp">
    <div id="rp-empty">
      <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
      </svg>
      <span>Bir il veya ilçeye<br>tıklayarak bilgileri görün</span>
    </div>
    <div id="rp-inner">
      <div id="rp-hdr">
        <div class="cstrip" id="cstrip"></div>
        <div id="rp-title"></div>
      </div>
      <div id="rp-acc"></div>
    </div>
  </div>
</div>

<div id="gl-overlay">
  <div id="gl-panel">
    <div id="gl-hdr">
      <span>🔗 Faydalı Linkler</span>
      <button id="gl-close">×</button>
    </div>
    <div id="gl-body"></div>
  </div>
</div>

const SK = 'ege_v6';
function loadStore(){ try { return JSON.parse(localStorage.getItem(SK)||'{}'); } catch { return {}; } }

// ── ZOOM ──────────────────────────────────────────────────────────────────────
const BASE_VB=[0,0,900,700]; let vb=[...BASE_VB];
function applyVB(){ document.getElementById('svg').setAttribute('viewBox',vb.join(' ')); }
function zoomAt(cx,cy,f){
  const[x,y,w,h]=vb, nw=Math.min(Math.max(w*f,120),900), nh=Math.min(Math.max(h*f,93),700);
  vb=[cx-(cx-x)*(nw/w),cy-(cy-y)*(nh/h),nw,nh]; applyVB();
}
function resetZoom(){ vb=[...BASE_VB]; applyVB(); }
const mw=document.getElementById('mw');
document.getElementById('z-in') .addEventListener('click',()=>zoomAt(vb[0]+vb[2]/2,vb[1]+vb[3]/2,.77));
document.getElementById('z-out').addEventListener('click',()=>zoomAt(vb[0]+vb[2]/2,vb[1]+vb[3]/2,1.3));
document.getElementById('z-rst').addEventListener('click',resetZoom);
mw.addEventListener('wheel',e=>{
  e.preventDefault();const r=mw.getBoundingClientRect();
  zoomAt(vb[0]+(e.clientX-r.left)/r.width*vb[2],vb[1]+(e.clientY-r.top)/r.height*vb[3],e.deltaY>0?1.15:0.87);
},{passive:false});

function nsEl(t){ return document.createElementNS('http://www.w3.org/2000/svg',t); }
function centroid(p){
  const n=p.match(/[-+]?\d+\.?\d*/g).map(Number); let sx=0,sy=0,c=0;
  for(let i=0;i<n.length-1;i+=2){sx+=n[i];sy+=n[i+1];c++;} return[sx/c,sy/c];
}

    gProv.appendChild(p);
    const[cx,cy]=centroid(prov.path); const t=nsEl('text');
    t.setAttribute('x',cx);t.setAttribute('y',cy);t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');t.setAttribute('class','ml');
    t.style.cssText='font-size:9.5px;font-weight:600;fill:#1a1a1a'; t.textContent=prov.name; gLbl.appendChild(t);
  });
  loadVolTable();
}

function renderIlce(){
  gDist.innerHTML='';gProv.innerHTML='';gOut.innerHTML='';gLbl.innerHTML='';
  document.getElementById('voltbl').style.display='none';
  Object.entries(DIST_DATA).forEach(([code,dists])=>{
    const prov=PROVINCES.find(p=>p.code===code);
    dists.forEach(d=>{
      const key=code+'_'+d.label; const p=nsEl('path');
      p.setAttribute('d',d.path); p.setAttribute('class','dp'); p.style.fill=getC(key)||getC(code)||DDEF;
      p.addEventListener('click',()=>{
        document.querySelectorAll('.dp').forEach(x=>x.classList.remove('hi')); p.classList.add('hi');
        showPanel(key, prov.name+' / '+d.label, getC(key)||getC(code), DIST_SECTIONS);
      });
      gDist.appendChild(p);
      const[cx,cy]=centroid(d.path); const t=nsEl('text');
      t.setAttribute('x',cx);t.setAttribute('y',cy);t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');t.setAttribute('class','ml');
      t.style.cssText='font-size:5px;font-weight:500;fill:rgba(26,26,26,.6)'; t.textContent=d.label; gLbl.appendChild(t);
    });
  });
  Object.entries(PROV_OUTLINES).forEach(([,path])=>{
    const p=nsEl('path');p.setAttribute('d',path);p.setAttribute('class','po');gOut.appendChild(p);
  });
  PROVINCES.forEach(prov=>{
    const dists=DIST_DATA[prov.code]||[];if(!dists.length)return;
    let sx=0,sy=0,n=0; dists.forEach(d=>{const[cx,cy]=centroid(d.path);sx+=cx;sy+=cy;n++;});
    const t=nsEl('text');t.setAttribute('x',sx/n);t.setAttribute('y',sy/n);t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');t.setAttribute('class','ml');
    t.style.cssText='font-size:8px;font-weight:700;fill:rgba(26,26,26,.38)'; t.textContent=prov.name; gLbl.appendChild(t);
  });
}

function setView(v){
  resetZoom();
  document.getElementById('btn-il'  ).className='vb'+(v==='il'  ?' on':'');
  document.getElementById('btn-ilce').className='vb'+(v==='ilce'?' on':'');
  document.getElementById('rp-empty').style.display='flex';
  document.getElementById('rp-inner').style.display='none';
  v==='il'?renderIl():renderIlce();
}

// ── PANEL ─────────────────────────────────────────────────────────────────────
function showPanel(key, title, color, sections){
  document.getElementById('rp-empty').style.display='none';
  document.getElementById('rp-inner').style.display='flex';
  document.getElementById('rp-title').textContent=title;
  document.getElementById('cstrip').style.background=color||'transparent';
  const acc=document.getElementById('rp-acc'); acc.innerHTML='';
  const contacts=(store.contacts||{})[key]||{};

  sections.forEach((sec,i)=>{
    const data=contacts[sec.key]||{};
    const hdr=document.createElement('div'); hdr.className='acc-hdr'+(i===0?' open':'');
    hdr.innerHTML='<span>'+sec.label+'</span><span class="arr">▾</span>';
    const body=document.createElement('div'); body.className='acc-body'+(i===0?' open':'');

    const hasData=sec.fields.some(f=>data[f.id]);
    if(!hasData){
      const noInfo=document.createElement('div'); noInfo.className='no-info';
      noInfo.textContent='Bilgi girilmemiş.'; body.appendChild(noInfo);
    } else {
      sec.fields.filter(f=>data[f.id]).forEach(f=>{
        const row=document.createElement('div'); row.className='cc-row';
        let val=data[f.id];
        if(f.id==='email') val='<a href="mailto:'+val+'">'+val+'</a>';
        if(f.id==='telefon') val='<a href="tel:'+val+'">'+val+'</a>';
        row.innerHTML='<span class="cc-k">'+f.label+'</span><span class="cc-v">'+val+'</span>';
        body.appendChild(row);
      });
    }

    hdr.addEventListener('click',()=>{
      const was=hdr.classList.contains('open');
      acc.querySelectorAll('.acc-hdr').forEach(h=>h.classList.remove('open'));
      acc.querySelectorAll('.acc-body').forEach(b=>b.classList.remove('open'));
      if(!was){hdr.classList.add('open');body.classList.add('open');}
    });
    acc.appendChild(hdr); acc.appendChild(body);
  });
}

// ── VOLUNTEER TABLE ───────────────────────────────────────────────────────────
(function buildVolTable(){
  const tbody=document.getElementById('vt-body');
  VOL_PROVS.forEach(p=>{
    const tr=document.createElement('tr');
    tr.innerHTML='<td>'+p.name+'</td><td id="vu_'+p.code+'">—</td>';
    tbody.appendChild(tr);
  });
})();
function loadVolTable(){
  VOL_PROVS.forEach(p=>{
    const el=document.getElementById('vu_'+p.code);
    if(el) el.textContent=(store.volunteers||{})[p.code]||'—';
  });
}

// ── LINKS ─────────────────────────────────────────────────────────────────────
document.getElementById('glbtn').addEventListener('click',()=>{
  document.getElementById('gl-overlay').style.display='flex'; renderLinks();
});
document.getElementById('gl-close').addEventListener('click',()=>{ document.getElementById('gl-overlay').style.display='none'; });
document.getElementById('gl-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('gl-overlay')) document.getElementById('gl-overlay').style.display='none';
});
function renderLinks(){
  const body=document.getElementById('gl-body'); body.innerHTML='';
  const links=store.globalLinks||[];
  if(!links.length){ body.innerHTML='<p style="padding:16px;text-align:center;font-size:13px;color:var(--tx3)">Henüz link eklenmemiş.</p>'; return; }
  links.forEach(l=>{
    const a=document.createElement('a'); a.href=l.url; a.target='_blank'; a.rel='noopener'; a.className='lnk-item';
    a.innerHTML='<span class="lnk-icon">🔗</span><span class="lnk-lbl">'+(l.label||l.url)+'</span><span class="lnk-arr">↗</span>';
    body.appendChild(a);
  });
}

// ── IMPORT ────────────────────────────────────────────────────────────────────
function doImport(ev){
  const file=ev.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      store=JSON.parse(e.target.result);
      if(!store.colors)store.colors={};if(!store.contacts)store.contacts={};
      if(!store.volunteers)store.volunteers={};if(!store.globalLinks)store.globalLinks=[];
      saveStore(store); setView('il');
    } catch{alert('Geçersiz veri dosyası.');}
  };
  r.readAsText(file); ev.target.value='';
}

setView('il');
</script>
